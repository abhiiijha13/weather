<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="container">
        <div class="weather-box">
            <h1>weather</h1>
            <div class="search-box">
                <input type="text" placeholder="Enter city name" id="cityInput">
                <button id="searchBtn">Search</button>
            </div>
            <div class="weather-info">
                <h2 id="cityName">Delhi</h2>
                <img src="https://cdn-icons-png.flaticon.com/512/1163/1163661.png" id="weathericon">
                <h3 id="temperature">25°C</h3>
                <p id="description">clear sky</p>
                <div class="details">
                    <div>
                        <h4>Humidity</h4>
                        <p id="Humidity">50%</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
